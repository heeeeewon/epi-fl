    .animate-soft-bounce { animation: softBounce 0.8s ease-in-out 1; }

      50% { transform: scale(1.01); }
      100% { transform: scale(1); }

    @keyframes softBounce {

    function QRCodeBox({ value, size = 190 }) {
      const ref = useRef(null);

      useEffect(() => {
        if (!ref.current) return;
        ref.current.innerHTML = "";
        const safeValue = value || "https://example.com";
        new QRCode(ref.current, {
          text: safeValue,
          width: size,
          height: size,
          correctLevel: QRCode.CorrectLevel.M,
        });
      }, [value, size]);

      return <div ref={ref} />;
    }

    function QuickInfo({ label, value }) {
      return (
        <div className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3">
          <div className="text-xs font-semibold uppercase tracking-wide text-slate-500">{label}</div>
          <div className="mt-1 text-lg font-bold text-slate-900">{value}</div>
        </div>
      );
    }

    function StatCard({ label, value, icon }) {
      return (
        <div className="rounded-2xl bg-white/10 px-4 py-3 ring-1 ring-white/15 backdrop-blur-sm shadow-sm">
          <div className="flex items-center gap-2 text-xs uppercase tracking-wide text-slate-200">
            <span className="text-sm leading-none">{icon}</span>
            <span>{label}</span>
          </div>
          <div className="mt-2 text-2xl font-bold text-white">{value}</div>
        </div>

    function getRank(score, total) {
      const ratio = total === 0 ? 0 : score / total;
      if (ratio >= 0.92) {
        return {
          label: "수석 역학 탐정",
          emoji: "👑",
          description: "지표 계산과 해석을 모두 정확히 연결했습니다.",
        };
      }
      if (ratio >= 0.75) {
        return {
          label: "우수 역학 조사관",
          emoji: "🕵️",
          description: "대부분의 지표를 정확히 해석했습니다.",
        };
      }
      if (ratio >= 0.55) {
        return {
          label: "보건 분석가",
          emoji: "📊",
          description: "기본 개념은 이해했지만 일부 지표 해석이 더 필요합니다.",
        };
      }
      return {
        label: "역학 입문자",
        emoji: "🌱",
        description: "분모와 지표 해석을 다시 차근차근 복습해 보세요.",

                          const isCorrect = option.correct;
                          let className = "w-full rounded-2xl border px-4 py-4 text-left transition-all duration-200 ";
                          if (!wasRevealed) className += "border-slate-200 bg-white hover:border-blue-400 hover:bg-blue-50 active:scale-[0.99]";
                          else if (isCorrect) className += "border-emerald-300 bg-emerald-50 shadow-[0_0_0_3px_rgba(16,185,129,0.12)]";
                          else if (isChosen) className += "border-rose-300 bg-rose-50 shadow-[0_0_0_3px_rgba(244,63,94,0.10)]";
                          else className += "border-slate-200 bg-slate-50 opacity-80";

                          return (
                            <button key={index} onClick={() => chooseOption(index)} className={className}>
                              <div className="flex items-start gap-3">
                                <div className={`mt-0.5 flex h-7 w-7 shrink-0 items-center justify-center rounded-full text-xs font-bold ${
                                  wasRevealed && isCorrect ? "bg-emerald-600 text-white" :
                                  wasRevealed && isChosen && !isCorrect ? "bg-rose-600 text-white" :
                                  "bg-slate-200 text-slate-700"
                                }`}>
                                  {String.fromCharCode(65 + index)}
                                </div>
                                <div className="leading-7 text-slate-800">{option.label}</div>
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </section>

                    {revealed[step.id] && selectedOption ? (
                      <section className={`rounded-3xl border p-5 shadow-sm transition-all duration-500 ${
                        selectedOption.correct ? "animate-soft-pulse border-emerald-300 bg-emerald-50" : "animate-soft-bounce border-rose-300 bg-rose-50"
                      }`}>
                        <div className="flex items-center gap-3">
                          <div className={`flex h-11 w-11 items-center justify-center rounded-full text-xl ${selectedOption.correct ? "bg-emerald-600 text-white" : "bg-rose-600 text-white"}`}>
                            {selectedOption.correct ? "✔" : "!"}
                          </div>
                          <div>
                            <p className={`font-bold ${selectedOption.correct ? "text-emerald-800" : "text-rose-800"}`}>
                              {selectedOption.correct ? "정답입니다" : "다시 해석해 보세요"}
                            </p>
                            <p className="text-sm text-slate-600">
                              {selectedOption.correct ? "좋아요, 계산과 해석이 맞았습니다." : "내 답과 정답을 비교해 보세요."}
                            </p>
                          </div>
                        </div>

                        <div className="mt-4 rounded-2xl border border-white/70 bg-white/80 p-4">
                          <p className="font-semibold text-slate-900">문항 해석</p>
                          <p className="mt-2 leading-7 text-slate-700">{step.options[correctIndex].explanation}</p>
                        </div>

                        <div className="mt-4 rounded-2xl border border-sky-200 bg-sky-50 p-4">
                          <p className="text-sm font-semibold text-sky-950">핵심 포인트</p>
                          <p className="mt-1 leading-7 text-sky-900">{step.learn}</p>
                        </div>
                      </section>
                    ) : (
                      <section className="rounded-3xl border border-dashed border-slate-300 bg-slate-50 p-5 text-sm text-slate-500">
                        답안을 선택하면 문항 해석과 핵심 포인트가 나타납니다.
                      </section>
                    )}
                  </div>
                </div>
              )}

              {!showSummary && started ? (
                <div className="flex items-center justify-between gap-3 border-t border-slate-200 bg-slate-50 px-4 py-4 sm:px-6">
                  <button
                    onClick={prevStep}
                    disabled={current === 0}
                    className="rounded-2xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-40"
                  >
                    이전
                  </button>
                  <button
                    onClick={nextStep}
                    disabled={selected[step.id] == null}
                    className="rounded-2xl bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-slate-300"
                  >
                    {current === totalQuestions - 1 ? "결과 보기" : "다음"}
                  </button>
                </div>
              ) : null}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
